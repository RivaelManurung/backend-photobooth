services:
  app:
    build: .
    command: ["./main"]
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8082}:8082"
    env_file:
      - .env.docker
    environment:
      PORT: 8082
      GIN_MODE: debug
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: photobooth
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORAGE_DRIVER: minio
      STORAGE_PROVIDER: minio
      STORAGE_BUCKET: photobooth
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_PUBLIC_BASE_URL: http://localhost:9000/photobooth
      STORAGE_FORCE_PATH_STYLE: "true"
      PAYMENT_PROVIDER: manual_qris
      EMAIL_DRIVER: log
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    volumes:
      - ./uploads:/app/uploads

  worker:
    build: .
    command: ["./worker"]
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: photobooth
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORAGE_DRIVER: minio
      STORAGE_PROVIDER: minio
      STORAGE_BUCKET: photobooth
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_PUBLIC_BASE_URL: http://localhost:9000/photobooth
      STORAGE_FORCE_PATH_STYLE: "true"
      WORKER_CONCURRENCY: 5
      EMAIL_DRIVER: log
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "pidof worker >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    volumes:
      - ./uploads:/app/uploads

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: photobooth
    ports:
      - "${POSTGRES_PORT:-5437}:5432"
    volumes:
      - postgres17_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d photobooth"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_DOCKER_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/photobooth || true;
      mc anonymous set download local/photobooth || true;
      exit 0;
      "

  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana-oss:latest
    profiles: ["observability"]
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  postgres17_data:
  redis_data:
  minio_data:
  grafana_data:
